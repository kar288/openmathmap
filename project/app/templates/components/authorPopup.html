<div class="authorPopup">
	<h5> {{name}} </h5>
	<a target="_blank" href="http://zbmath.org/authors/?s=0&c=100&q={{key}}">zbMATH page</a>
	<hr>
	<div class="row">
		<div class="col-sm-6">
			<button type="submit" author="{{key}}" class="timeline btn btn-primary btn-xs">
				Timeline
			</button>
		</div>
		<div class="col-sm-6">
			<button type="submit" author="{{key}}" class="classes btn btn-primary btn-xs">
				Classes
			</button>
		</div>
	</div>
</div>'
